<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wireframe - Milestone 3 (Criação de Spot)</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center font-sans">
    
    <!-- Mobile Container -->
    <div class="w-[400px] h-[800px] bg-white rounded-[40px] shadow-2xl relative overflow-hidden border-[8px] border-gray-900 flex flex-col">
        
        <!-- Fundo (Mapa Mock) -->
        <div class="absolute inset-0 bg-gray-200 flex flex-col items-center justify-center text-gray-400 z-0">
            [ Mapa de Fundo ]
        </div>

        <!-- FAB (Adicionar Spot) -->
        <div class="absolute bottom-10 left-1/2 -translate-x-1/2 z-10">
            <button class="bg-[#ff5a5f] w-16 h-16 rounded-full flex items-center justify-center text-white text-3xl shadow-[0_10px_20px_-5px_rgba(255,90,95,0.6)]">
                +
            </button>
        </div>

        <!-- BOTTOM SHEET MOCKUP (Spot Creator Overlay) -->
        <div class="absolute inset-0 bg-black/60 z-20 flex flex-col justify-end">
            <!-- Sheet -->
            <div class="bg-white rounded-t-3xl p-6 flex flex-col gap-6 shadow-2xl transform translate-y-0 transition-transform">
                
                <!-- Handlebar -->
                <div class="w-12 h-1.5 bg-gray-300 rounded-full mx-auto -mt-2"></div>

                <div class="text-center">
                    <h2 class="text-2xl font-bold text-gray-900">Mapear este Local</h2>
                    <p class="text-sm text-gray-500 mt-1">Imortalize a vista daqui para a comunidade.</p>
                </div>

                <!-- Botão de Tirar Foto (Aciona Camera Nativa) -->
                <div class="w-full h-48 bg-gray-100 rounded-2xl border-2 border-dashed border-gray-300 flex flex-col items-center justify-center cursor-pointer hover:bg-gray-50">
                    <span class="text-4xl mb-2">📸</span>
                    <span class="text-gray-600 font-semibold">Tirar Foto do Local</span>
                    <span class="text-xs text-gray-400 mt-1">A câmera será aberta</span>
                </div>

                <!-- Input Título -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Dê um nome para este lugar</label>
                    <input type="text" placeholder="Ex: Mirante do Sol Poente..." class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-gray-800 outline-none focus:ring-2 focus:ring-[#ff5a5f]">
                </div>

                <!-- Status de GPS -->
                <div class="flex items-center gap-2 text-sm text-green-600 bg-green-50 px-4 py-2 rounded-lg">
                    <span>📍</span> Coordenada Local Travada com Sucesso.
                </div>

                <!-- Botão Enviar -->
                <button class="w-full bg-[#ff5a5f] text-white font-bold py-4 rounded-xl shadow-lg mt-2">
                    Enterrar Spot no Mapa
                </button>

            </div>
        </div>

    </div>
</body>
</html>
