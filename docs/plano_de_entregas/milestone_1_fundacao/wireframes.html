<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wireframe - Milestone 1 - Splash / Base</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#ff5a5f',
                        light: '#ffffff',
                        dark: '#121212'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-light text-dark min-h-screen flex flex-col items-center justify-center">

    <!-- Interface Fake de Loading Inicial para provar o Lazy Login rodando por trás -->
    <div class="text-center">
        <!-- Logo (Placeholder) -->
        <h1 class="text-5xl font-extrabold tracking-tight mb-4">
            SUN<span class="text-brand">SET</span>
        </h1>
        <p class="text-gray-500 text-sm mb-8 animate-pulse">Iniciando ambiente local (PWA) e gerando ID...</p>
        
        <div class="mt-10 p-6 bg-gray-50 rounded-xl border border-gray-200 text-left w-96 max-w-full shadow-sm">
            <h2 class="text-gray-800 font-bold mb-2">Simulação de Lazy Login:</h2>
            <div class="flex flex-col gap-2 font-mono text-xs text-gray-500">
                <p>1. Verificando LocalStorage...</p>
                <p class="text-brand">2. Nenhum ID encontrado.</p>
                <p>3. Gerando Device UUID (Ghost Account)...</p>
                <p class="text-green-600 font-bold">4. ID: a4f8-99b2-xc81...</p>
                <p>5. Salvando silenciosamente no Supabase.</p>
            </div>
            <button class="w-full mt-6 bg-brand hover:bg-red-500 text-white font-bold py-3 px-4 rounded-lg transition-colors shadow-md">
                Entrar no App (Anônimo)
            </button>
        </div>
    </div>

</body>
</html>
