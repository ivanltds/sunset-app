<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wireframe - Milestone 4 (Feed 'Pinterest' Híbrido)</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center font-sans">
    
    <!-- Mobile Container -->
    <div class="w-[400px] h-[800px] bg-white rounded-[40px] shadow-2xl relative overflow-hidden border-[8px] border-gray-900 flex flex-col">
        
        <!-- Fundo (Mapa Reduzido) -->
        <div class="h-[40%] bg-gray-200 flex flex-col items-center justify-center text-gray-400 z-0">
            [ Mapa Core (Zoom reduzido) ]
        </div>

        <!-- Feed Overlay (Bottom Sheet que subiu até 60%) -->
        <div class="absolute inset-x-0 bottom-0 h-[60%] bg-white rounded-t-3xl shadow-[0_-10px_20px_rgba(0,0,0,0.1)] z-20 flex flex-col overflow-hidden transition-all duration-300">
            
            <!-- Handlebar (Draggable) -->
            <div class="w-12 h-1.5 bg-gray-300 rounded-full mx-auto mt-4 mb-2 shrink-0 cursor-grab"></div>

            <div class="px-6 py-2 flex justify-between items-center shrink-0">
                <h2 class="text-2xl font-bold text-gray-900">Arredores</h2>
                <span class="text-sm text-gray-500 font-semibold bg-gray-100 px-3 py-1 rounded-full">12 Spots</span>
            </div>

            <!-- Feed Grid (Masonry Mock) -->
            <div class="flex-1 overflow-y-auto px-4 pb-6 mt-2">
                <div class="columns-2 gap-4 space-y-4">
                    
                    <!-- Card 1 -->
                    <div class="break-inside-avoid relative rounded-2xl overflow-hidden group">
                        <div class="w-full h-48 bg-gray-300 flex items-center justify-center text-gray-500">[ Foto 1 ]</div>
                        <!-- Overlay Ações -->
                        <div class="absolute bottom-0 w-full p-3 bg-gradient-to-t from-black/80 to-transparent flex justify-between items-end">
                            <span class="text-white text-xs font-bold truncate pr-2">Mirante do Sol</span>
                            <div class="flex flex-col gap-2">
                                <button class="w-8 h-8 bg-white/20 backdrop-blur-sm rounded-full flex items-center justify-center text-white text-sm hover:bg-[#ff5a5f] transition-colors">♥</button>
                                <button class="w-8 h-8 bg-white/20 backdrop-blur-sm rounded-full flex items-center justify-center text-white text-sm hover:bg-yellow-500 transition-colors">⭐</button>
                            </div>
                        </div>
                    </div>

                    <!-- Card 2 -->
                    <div class="break-inside-avoid relative rounded-2xl overflow-hidden group">
                        <div class="w-full h-64 bg-gray-400 flex items-center justify-center text-white">[ Foto 2 Vertical ]</div>
                        <!-- Overlay Ações -->
                        <div class="absolute bottom-0 w-full p-3 bg-gradient-to-t from-black/80 to-transparent flex justify-between items-end">
                            <span class="text-white text-xs font-bold truncate pr-2">Praia Secreta</span>
                            <div class="flex flex-col gap-2">
                                <button class="w-8 h-8 bg-white/20 backdrop-blur-sm rounded-full flex items-center justify-center text-white text-sm hover:bg-[#ff5a5f] transition-colors">♥</button>
                                <button class="w-8 h-8 bg-white/20 backdrop-blur-sm rounded-full flex items-center justify-center text-white text-sm hover:bg-yellow-500 transition-colors">⭐</button>
                            </div>
                        </div>
                    </div>

                    <!-- Card 3 -->
                    <div class="break-inside-avoid relative rounded-2xl overflow-hidden group">
                        <div class="w-full h-40 bg-gray-300 flex items-center justify-center text-gray-500">[ Foto 3 ]</div>
                    </div>

                </div>
            </div>
        </div>

        <!-- FAB (Adicionar Spot no modo híbrido) -->
        <div class="absolute bottom-6 right-6 z-30">
            <button class="bg-[#ff5a5f] w-14 h-14 rounded-full flex items-center justify-center text-white text-2xl shadow-lg">
                +
            </button>
        </div>

    </div>
</body>
</html>
